<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- Allow all external sources (required for pywebview) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Ukraine Drone Map</title>

  <!-- Leaflet — local copy first (downloaded on first run), CDN fallback -->
  <link rel="stylesheet" href="/static/lib/leaflet.css"
        onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'">
  <script>
    function loadScript(local, cdn) {
      var s = document.createElement('script');
      s.src = local;
      s.onerror = function() { var f = document.createElement('script'); f.src = cdn; document.head.appendChild(f); };
      document.head.appendChild(s);
    }
  </script>
  <script src="/static/lib/leaflet.js"
          onerror="loadScript('','https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')"></script>
  <script src="/static/lib/ant-path.js"
          onerror="loadScript('','https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js')"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<aside id="panel">
  <header>
    <div id="title">
      <span class="shield">🛡️</span>
      <div>
        <div class="app-name">UKRAINE DRONE MAP</div>
        <div class="app-sub">Air Threat Intelligence</div>
      </div>
    </div>

    <div id="counters">
      <div class="count-cell">
        <div class="count-num" id="c-total">0</div>
        <div class="count-lbl">Total</div>
      </div>
      <div class="count-cell">
        <div class="count-num" id="c-active">0</div>
        <div class="count-lbl">Active</div>
      </div>
      <div class="count-cell">
        <div class="count-num" id="c-destroyed">0</div>
        <div class="count-lbl">Destroyed</div>
      </div>
    </div>

    <div id="status-row">
      <div id="conn">
        <span id="conn-dot" class="dot"></span>
        <span id="conn-txt">Connecting</span>
      </div>
      <div id="update-row">
        <span id="update-txt">Loading history…</span>
      </div>
    </div>
  </header>

  <div id="filters">
    <button class="f active" data-f="all">All</button>
    <button class="f" data-f="drone">Drones</button>
    <button class="f" data-f="missile">Missiles</button>
    <button class="f" data-f="glidebomb">Glide Bombs</button>
    <button class="f" data-f="moving">Moving</button>
    <button class="f" data-f="destroyed">Destroyed</button>
  </div>

  <div id="feed-tabs">
    <button class="tab-btn active" data-tab="live">LIVE FEED</button>
    <button class="tab-btn" data-tab="raw">RAW</button>
  </div>
  <div id="feed"></div>
  <div id="feed-raw" style="display:none"></div>
</aside>

<div id="map">
  <div id="no-threats" style="display:none">No active threats in the last 30 minutes</div>
</div>

<div id="legend">
  <div class="leg-title">Threat type</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,1 L15,13 L11,11 L8,14 L5,11 L1,13 Z" fill="#f97316"/></svg> Shahed / Drone</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L12,12 L10,11 L8,15 L6,11 L4,12 Z" fill="#ef4444"/></svg> Cruise Missile</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,2 L15,7 L12,8 L8,15 L4,8 L1,7 Z" fill="#f59e0b"/></svg> Glide Bomb (KAB/FAB)</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L10,14 L8,11 L6,14 Z" fill="#a855f7"/></svg> Kinzhal</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,1 C11,1 13,5 13,10 C13,14 11,15 8,15 C5,15 3,14 3,10 C3,5 5,1 8,1 Z" fill="#eab308"/></svg> Ballistic / Iskander</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L10,5 L16,6 L16,8 L10,8 L11,16 L8,14 L5,16 L6,8 L0,8 L0,6 L6,5 Z" fill="#38bdf8"/></svg> Aviation</div>
  <div class="leg-title" style="margin-top:8px">Status ring</div>
  <div class="leg-row"><span class="ring-swatch" style="border-color:#f97316"></span> Active / Moving</div>
  <div class="leg-row"><span class="ring-swatch" style="border-color:#22c55e;border-style:dashed"></span> Destroyed</div>
  <div class="leg-row"><span class="ring-swatch" style="border-color:#facc15"></span> Alert</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
