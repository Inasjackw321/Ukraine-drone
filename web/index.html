<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ukraine Drone Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet ant-path for animated trajectories -->
  <script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ── Sidebar ────────────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="logo">
      <span class="logo-icon">🛡️</span>
      <div>
        <div class="logo-title">UKRAINE DRONE MAP</div>
        <div class="logo-sub">Live Threat Intelligence</div>
      </div>
    </div>

    <div id="stats-bar">
      <div class="stat-item">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-lbl">Events</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="stat-active">0</span>
        <span class="stat-lbl">Active</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="stat-destroyed">0</span>
        <span class="stat-lbl">Destroyed</span>
      </div>
    </div>

    <div id="connection-badge">
      <span id="ws-dot" class="dot dot-connecting"></span>
      <span id="ws-label">Connecting…</span>
    </div>
  </div>

  <div id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="drone">Drones</button>
    <button class="filter-btn" data-filter="missile">Missiles</button>
    <button class="filter-btn" data-filter="moving">Moving</button>
    <button class="filter-btn" data-filter="destroyed">Destroyed</button>
  </div>

  <div id="feed-header">THREAT FEED</div>
  <div id="feed"></div>
</div>

<!-- ── Map ────────────────────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── Legend ─────────────────────────────────────────────────────────────── -->
<div id="legend">
  <div class="legend-title">Threat Types</div>
  <div class="legend-row"><span class="legend-dot" style="background:#ff6600"></span> Shahed / Geranium</div>
  <div class="legend-row"><span class="legend-dot" style="background:#ffaa00"></span> БПЛА / Drone</div>
  <div class="legend-row"><span class="legend-dot" style="background:#ff0000"></span> Cruise Missile</div>
  <div class="legend-row"><span class="legend-dot" style="background:#cc00ff"></span> Kinzhal</div>
  <div class="legend-row"><span class="legend-dot" style="background:#888"></span> Unknown</div>
  <div class="legend-title" style="margin-top:8px">Status</div>
  <div class="legend-row"><span class="legend-dot" style="background:#ff6600;box-shadow:0 0 6px #ff6600"></span> Moving / Active</div>
  <div class="legend-row"><span class="legend-dot" style="background:#00ff44"></span> Destroyed</div>
  <div class="legend-row"><span class="legend-dot" style="background:#ffdd00"></span> Alert</div>
</div>

<!-- ── Detail popup (bottom right) ──────────────────────────────────────── -->
<div id="detail-panel" class="hidden">
  <button id="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
