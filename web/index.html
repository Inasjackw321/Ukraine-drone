<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- Allow all external sources (required for pywebview) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Ukraine Drone Map</title>

  <!-- Leaflet — served locally (downloaded once by app.py on first run) -->
  <link rel="stylesheet" href="/static/lib/leaflet.css">
  <script src="/static/lib/leaflet.js"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<aside id="panel">
  <header>
    <div id="title">
      <span class="shield">🛡️</span>
      <div>
        <div class="app-name">UKRAINE DRONE MAP</div>
        <div class="app-sub">Air Threat Intelligence</div>
      </div>
    </div>

    <div id="counters">
      <div class="count-cell">
        <div class="count-num" id="c-total">0</div>
        <div class="count-lbl">Total</div>
      </div>
      <div class="count-cell">
        <div class="count-num" id="c-active">0</div>
        <div class="count-lbl">Active</div>
      </div>
      <div class="count-cell">
        <div class="count-num" id="c-destroyed">0</div>
        <div class="count-lbl">Destroyed</div>
      </div>
    </div>

    <div id="status-row">
      <div id="conn">
        <span id="conn-dot" class="dot"></span>
        <span id="conn-txt">Connecting</span>
      </div>
      <div id="update-row">
        <span id="update-txt">Live updates every minute</span>
      </div>
    </div>
  </header>

  <div id="filters">
    <button class="f active" data-f="all">All</button>
    <button class="f" data-f="drone">Drones</button>
    <button class="f" data-f="missile">Missiles</button>
    <button class="f" data-f="aviation">Aviation</button>
    <button class="f" data-f="moving">Moving</button>
    <button class="f" data-f="destroyed">Destroyed</button>
  </div>

  <div id="feed-head">LIVE FEED</div>
  <div id="feed"></div>
</aside>

<div id="map"></div>

<div id="legend">
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><polygon points="8,1 15,15 8,11 1,15" fill="#f97316"/></svg> Shahed / Drone</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><polygon points="8,1 15,15 8,11 1,15" fill="#ef4444"/></svg> Cruise Missile</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><polygon points="8,1 15,15 8,11 1,15" fill="#a855f7"/></svg> Kinzhal</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><polygon points="8,1 15,15 8,11 1,15" fill="#eab308"/></svg> Ballistic / Iskander</div>
  <div class="leg-title" style="margin-top:8px">Status ring</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L10,5 L16,6 L16,8 L10,8 L11,16 L8,14 L5,16 L6,8 L0,8 L0,6 L6,5 Z" fill="#38bdf8"/></svg> Aviation</div>
  <div class="leg-row"><span class="ring-swatch" style="border-color:#f97316"></span> Active / Moving</div>
  <div class="leg-row"><span class="ring-swatch" style="border-color:#22c55e"></span> Destroyed</div>
  <div class="leg-row"><span class="ring-swatch" style="border-color:#facc15"></span> Alert</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
