<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <!-- Allow all external sources (required for pywebview) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Ukraine Drone Map</title>

  <!-- Leaflet — local copy first (downloaded on first run), CDN fallback -->
  <link rel="stylesheet" href="/static/lib/leaflet.css"
        onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'">
  <script>
    function loadScript(local, cdn) {
      var s = document.createElement('script');
      s.src = local;
      s.onerror = function() { var f = document.createElement('script'); f.src = cdn; document.head.appendChild(f); };
      document.head.appendChild(s);
    }
  </script>
  <script src="/static/lib/leaflet.js"
          onerror="loadScript('','https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')"></script>
  <script src="/static/lib/ant-path.js"
          onerror="loadScript('','https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js')"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<aside id="panel">
  <header>
    <div id="title">
      <span class="shield">🛡️</span>
      <div>
        <div class="app-name">UKRAINE DRONE MAP</div>
        <div class="app-sub">Air Threat Intelligence</div>
      </div>
    </div>

    <div id="counters">
      <div class="count-cell">
        <div class="count-num" id="c-total">0</div>
        <div class="count-lbl">Total</div>
      </div>
      <div class="count-cell">
        <div class="count-num" id="c-active">0</div>
        <div class="count-lbl">Active</div>
      </div>
      <div class="count-cell">
        <div class="count-num" id="c-destroyed">0</div>
        <div class="count-lbl">Destroyed</div>
      </div>
    </div>

    <div id="status-row">
      <div id="conn">
        <span id="conn-dot" class="dot"></span>
        <span id="conn-txt">Connecting</span>
      </div>
      <div id="update-row">
        <span id="update-txt">Loading history…</span>
      </div>
    </div>
  </header>

  <div id="filters">
    <button class="f active" data-f="all">All</button>
    <button class="f" data-f="drone">Drones</button>
    <button class="f" data-f="missile">Missiles</button>
    <button class="f" data-f="glidebomb">Glide Bombs</button>
    <button class="f" data-f="moving">Moving</button>
    <button class="f" data-f="destroyed">Destroyed</button>
  </div>

  <div id="feed-tabs">
    <button class="tab-btn active" data-tab="live">LIVE FEED</button>
    <button class="tab-btn" data-tab="raw">RAW</button>
  </div>
  <div id="feed"></div>
  <div id="feed-raw" style="display:none"></div>
</aside>

<div id="map">
  <div id="no-threats" style="display:none">No active threats in the last 30 minutes</div>
</div>

<div id="legend">
  <div class="leg-title">Threat type</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L16,14 L8,9 L0,14 Z" fill="#f97316" stroke="#0006" stroke-width="0.8"/></svg> Shahed / Drone</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L11,16 L8,11 L5,16 Z" fill="#ef4444" stroke="#0006" stroke-width="0.8"/></svg> Cruise Missile</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L16,8 L8,16 L0,8 Z" fill="#f59e0b" stroke="#0006" stroke-width="0.8"/></svg> Glide Bomb (KAB/FAB)</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L9.5,16 L8,12 L6.5,16 Z" fill="#a855f7" stroke="#0006" stroke-width="0.8"/></svg> Kinzhal</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,1 L13,16 L8,11 L3,16 Z" fill="#eab308" stroke="#0006" stroke-width="0.8"/></svg> Ballistic / Iskander</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L10,5 L16,6 L16,8 L10,8 L11,16 L8,14 L5,16 L6,8 L0,8 L0,6 L6,5 Z" fill="#38bdf8" stroke="#0006" stroke-width="0.8"/></svg> Aviation</div>
  <div class="leg-title" style="margin-top:8px">Status</div>
  <div class="leg-row"><span style="color:#f97316;font-size:14px;line-height:1">▲</span> Active / Moving</div>
  <div class="leg-row"><span style="color:#64748b;font-size:14px;line-height:1">▲</span> Destroyed (grey)</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
