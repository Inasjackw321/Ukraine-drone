<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Ukraine Drone Map</title>

  <link rel="stylesheet" href="/static/lib/leaflet.css"
        onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'">
  <script>
    function loadScript(local, cdn) {
      var s = document.createElement('script');
      s.src = local;
      s.onerror = function() { var f = document.createElement('script'); f.src = cdn; document.head.appendChild(f); };
      document.head.appendChild(s);
    }
  </script>
  <script src="/static/lib/leaflet.js"
          onerror="loadScript('','https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')"></script>
  <script src="/static/lib/ant-path.js"
          onerror="loadScript('','https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js')"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="map">
  <div id="no-threats" style="display:none">No active threats detected</div>
</div>

<!-- Minimal floating HUD -->
<div id="hud">
  <div id="hud-title">🛡 UKRAINE AIR THREAT <span id="hud-ver">v1.6</span></div>
  <div id="hud-counts">
    <div class="hc"><span id="c-active">0</span><span class="hl">ACTIVE</span></div>
    <div class="hc hc-sep"><span id="c-destroyed">0</span><span class="hl">DESTROYED</span></div>
  </div>
  <div id="hud-conn">
    <span id="conn-dot" class="dot"></span>
    <span id="conn-txt">Connecting</span>
  </div>
</div>

<!-- Legend -->
<div id="legend">
  <div class="leg-title">Threat type</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L16,14 L8,9 L0,14 Z" fill="#f97316" stroke="#0006" stroke-width="0.8"/></svg> Shahed / Drone</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L11,16 L8,11 L5,16 Z" fill="#ef4444" stroke="#0006" stroke-width="0.8"/></svg> Cruise Missile</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L16,8 L8,16 L0,8 Z" fill="#f59e0b" stroke="#0006" stroke-width="0.8"/></svg> Glide Bomb (KAB/FAB)</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L9.5,16 L8,12 L6.5,16 Z" fill="#a855f7" stroke="#0006" stroke-width="0.8"/></svg> Kinzhal</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,1 L13,16 L8,11 L3,16 Z" fill="#eab308" stroke="#0006" stroke-width="0.8"/></svg> Ballistic / Iskander</div>
  <div class="leg-row"><svg viewBox="0 0 16 16" class="leg-icon"><path d="M8,0 L10,5 L16,6 L16,8 L10,8 L11,16 L8,14 L5,16 L6,8 L0,8 L0,6 L6,5 Z" fill="#38bdf8" stroke="#0006" stroke-width="0.8"/></svg> Aviation</div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
